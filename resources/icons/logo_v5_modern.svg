<!-- Tadado Logo — v5 modern, cooler palette -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260">
  <defs>
    <!-- Progress ring: indigo → electric violet → cyan -->
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4F46E5"/>
      <stop offset="40%"  stop-color="#7C3AED"/>
      <stop offset="80%"  stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <!-- Checkmark: slightly lighter -->
    <linearGradient id="check" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <radialGradient id="glow" cx="0.45" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g transform="translate(55, 35)">
    <!-- Glow behind checkmark area -->
    <circle cx="75" cy="75" r="72" fill="url(#glow)"/>

    <!-- Background track ring -->
    <circle cx="75" cy="75" r="60" fill="none" stroke="#E5E7EB" stroke-width="7"/>

    <!-- Progress arc (75%) -->
    <circle cx="75" cy="75" r="60" fill="none" stroke="url(#ring)" stroke-width="7"
            stroke-linecap="round"
            stroke-dasharray="283 377" stroke-dashoffset="0"
            transform="rotate(-90 75 75)"/>

    <!-- Checkmark -->
    <polyline points="48,78 66,98 102,58"
              fill="none" stroke="url(#check)" stroke-width="8"
              stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Accent dot at tip -->
    <circle cx="102" cy="58" r="4.5" fill="#22D3EE"/>
  </g>

  <text x="255" y="140" font-family="Segoe UI, -apple-system, sans-serif"
        font-size="72" font-weight="800" fill="#1E1B4B" letter-spacing="-1.5">Tadado</text>
  <text x="255" y="185" font-family="Segoe UI, -apple-system, sans-serif"
        font-size="18" font-weight="500" fill="#9CA3AF" letter-spacing="5">LESS NOISE. MORE DONE.</text>
</svg>
