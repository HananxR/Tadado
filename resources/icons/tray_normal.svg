<!-- Tadado Tray Icon — minimal checkmark mark, readable at 16×16 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>

  <!-- Solid rounded square -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Bold checkmark, centered -->
  <polyline points="16,34 27,46 48,22"
            fill="none" stroke="white" stroke-width="5.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Accent dot -->
  <circle cx="48" cy="22" r="3.5" fill="#22D3EE"/>
</svg>
