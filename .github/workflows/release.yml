name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest

  build:
    needs: test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: |
          uv sync --dev
          uv pip install pyinstaller

      - name: Generate package database
        run: uv run python scripts/create_package_db.py

      - name: PyInstaller build
        run: |
          uv run pyinstaller `
            --noconsole `
            --name=Tadado `
            --add-data="resources;resources" `
            --icon=resources/icons/app.ico `
            --hidden-import=PySide6.QtSvg `
            --clean `
            main.py

      - name: Create portable ZIP
        run: |
          Compress-Archive -Path dist/Tadado/* -DestinationPath dist/Tadado_portable.zip

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --yes --limit-output

      - name: Update installer version
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content installer.iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion ""$tag""" | Set-Content installer.iss
          Write-Host "Installer version set to: $tag"

      - name: Inno Setup compile
        run: iscc installer.iss

      - name: Upload artifacts (portable)
        uses: actions/upload-artifact@v4
        with:
          name: portable
          path: dist/Tadado_portable.zip

      - name: Upload artifacts (installer)
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/Tadado_setup*.exe

      - name: Upload artifacts (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: standalone
          path: dist/Tadado/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tadado ${{ github.ref_name }}
          body: |
            ## 安装方式

            - **安装包**：`Tadado_setup_*.exe`，一键安装
            - **便携版**：`Tadado_portable.zip`，解压即用

            ## 系统要求
            - Windows 10 / 11
            - 无需 Python 环境

            🤖 Generated with [Claude Code](https://claude.com/claude-code)
          draft: false
          files: |
            portable/*.zip
            installer/*.exe
