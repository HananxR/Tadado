name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # 让 GitHub 根据提交历史自动生成更新日志
          allowUpdates: true             # 👈 核心配置：允许覆盖已有的Release，防止冲突报错
          prerelease: false              # 设为正式发布（如需测试版可改为 true）